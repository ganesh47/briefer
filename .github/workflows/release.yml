name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists, skipping create."
            exit 0
          fi

          args=(
            "${{ steps.version.outputs.tag }}"
            --title "Briefer ${{ steps.version.outputs.tag }}" \
            --generate-notes
          )
          previous_tag="$(git tag --sort=-version:refname | sed -n '2p')"
          if [[ -n "$previous_tag" ]]; then
            args+=(--notes-start-tag "$previous_tag")
          fi

          gh release create "${args[@]}" \
            --notes "$(cat <<'EOF'
          ## Briefer ${{ steps.version.outputs.tag }}

          GitHub release for the public app scaffold and learning-flow mechanics.
          Private learning content is not included in this public release.

          See the commit history for implementation details:
          https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
